name: container-image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

  schedule:
    # Ideally, we would update the image every time the base image
    # (p4lang/behavioral-model) is updated, this is good enough.
    # "At minute 15 past every 4th hour from midnight through 23."
    - cron: "15 0-23/4 * * *"

# Cancel any preceding run on the pull request.
concurrency:
  group: container-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    if: ${{ github.repository == 'p4lang/p4c' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ubuntu-container-image
          max-size: 1000M
      - name: Determine Docker image tag
        id: get-tag
        shell: bash
        run: |
          TAG=""
          if [[ "$GITHUB_REF" =~ "main" ]]; then
              TAG="latest"
          else
              TAG=${GITHUB_REF////_}
          fi
          echo "Tag is $TAG"
          echo "::set-output name=tag::$TAG"
      - name: Determine build mode
        id: build-mode
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "image_type=build" >> "$GITHUB_OUTPUT"
            echo "export_ccache=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_type=test" >> "$GITHUB_OUTPUT"
            echo "export_ccache=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image to registry
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: p4lang/p4c:${{ steps.get-tag.outputs.tag }}
          build-args: |
            IMAGE_TYPE=${{ steps.build-mode.outputs.image_type }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Export ccache
        if: ${{ steps.build-mode.outputs.export_ccache == 'true' }}
        run: |
          ./tools/export_ccache.sh p4lang/p4c:${{ steps.get-tag.outputs.tag }}
      - name: Push Docker image to registry
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        run: |
          docker push p4lang/p4c:${{ steps.get-tag.outputs.tag }}
