name: Auto Label Issues and PRs

on:
  issues:
    types: [opened, edited]  # Runs when an issue is created or modified
  pull_request_target:
    types: [opened, edited]  # Runs when a PR is created or modified
  workflow_dispatch:  # Allows manual triggering

permissions:
  issues: write  # Ensure the token has write access to issues
  pull-requests: write  # Ensure the token has write access to PRs
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label Issues and PRs
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ====================================================================
            // LABEL MAPPINGS DATA
            // ====================================================================
            // Shared mappings that apply to both issues and pull requests
            // These are component/target labels that have the same meaning in both contexts
            const sharedMappings = {
              "[infra]": "infrastructure",
              "[infrastructure]": "infrastructure",
              "[docs]": "documentation",
              "[documentation]": "documentation",
              "[dpdk]": "dpdk",
              "[bmv2]": "bmv2",
              "[ebpf]": "ebpf",
              "[ubpf]": "ubpf",
              "[graphs]": "graphs",
              "[p4testgen]": "p4tools",
              "[p4smith]": "p4tools",
              "[p4tools]": "p4tools",
              "[p4tc]": "p4tc",
              "[p4fmt]": "p4fmt",
              "[core]": "core",
              "[p4-spec]": "p4-spec",
              "[control-plane]": "control-plane",
              "[p4runtime]": "control-plane",
              "[frontend]": "core",
              "[midend]": "core",
              "[parser]": "core",
              "[python]": "python",
              "[pna-bmv2]": "pna-bmv2",
              "[psa-bmv2]": "psa-bmv2",
              "[ebpf-psa]": "ebpf-psa",
              "[tofino]": "tofino",
            };
            
            // Issue-specific mappings
            // These labels are semantically meaningful only for issues
            const issueMappings = {
              "[bug]": "bug",
              "[feature]": "enhancement",
            };
            
            // PR-specific mappings
            // Currently empty as all PR labels are shared with issues
            const prMappings = {};
            
            // ====================================================================
            // LABELING LOGIC
            // ====================================================================
            
            // Determine if we're processing an issue or PR
            const isPR = !!context.payload.pull_request;
            const isIssue = !!context.payload.issue;
            
            let itemToLabel;
            let itemNumber;
            
            if (isPR) {
              itemToLabel = context.payload.pull_request;
              itemNumber = context.payload.pull_request.number;
            } else if (isIssue) {
              itemToLabel = context.payload.issue;
              itemNumber = context.issue.number;
            } else {
              console.log("Not an issue or PR event, exiting");
              return;
            }
            
            // Combine shared mappings with context-specific mappings
            const labelMappings = {
              ...sharedMappings,
              ...(isPR ? prMappings : issueMappings)
            };
            
            const labelsToAdd = [];
            const title = itemToLabel.title.toLowerCase();
            
            // Find matching labels (case-insensitive)
            for (const [keyword, label] of Object.entries(labelMappings)) {
              if (title.includes(keyword.toLowerCase())) {
                if (!labelsToAdd.includes(label)) {
                  labelsToAdd.push(label);
                }
                console.log(`Matched keyword "${keyword}" -> label "${label}"`);
              }
            }
            
            // Apply labels if any were found
            if (labelsToAdd.length > 0) {
              console.log(`Adding labels: ${labelsToAdd.join(', ')}`);
              
              await github.rest.issues.addLabels({
                issue_number: itemNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labelsToAdd
              });
              
              console.log(`Successfully added ${labelsToAdd.length} label(s)`);
            } else {
              console.log('No matching labels found for this title');
            }

